name: Blog Content Sync

permissions:
  contents: write

on:
  repository_dispatch:
    types: [blog-content-updated]

jobs:
  sync-content:
    runs-on: ubuntu-latest
    env:
      TARGET_BRANCH_HASH: ${{ github.event.client_payload.sha }}
      BLOG_POSTS_DIR: apps/blog/content/posts
    steps:
      - name: Checkout blog repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main
          fetch-depth: 0

      - name: Add Obsidian fetch key
        env:
          OBSIDIAN_SSH_KEY: ${{ secrets.OBSIDIAN_FETCH_KEY }}
          BLOG_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$OBSIDIAN_SSH_KEY" > ~/.ssh/obsidian_fetch
          chmod 600 ~/.ssh/obsidian_fetch
          echo "$BLOG_SSH_KEY" > ~/.ssh/blog_push
          chmod 600 ~/.ssh/blog_push
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Fetch Obsidian repository
        run: |
          rm -rf /tmp/obsidian
          git init /tmp/obsidian
          cd /tmp/obsidian
          GIT_SSH_COMMAND='ssh -i ~/.ssh/obsidian_fetch' git remote add origin git@github.com:Sangjun-man/obsidian.git
          GIT_SSH_COMMAND='ssh -i ~/.ssh/obsidian_fetch' git fetch origin

          if [[ -n "${TARGET_BRANCH_HASH}" ]]; then
            git checkout -B sync-target "${TARGET_BRANCH_HASH}"
          else
            git checkout -B sync-target origin/main
          fi

      - name: Move and convert Blog posts
        run: |
          TMP_POSTS_DIR=$(mktemp -d)
          missing_title=0
          copied_count=0

          while IFS= read -r -d '' file; do
            title=$(sed -n '/^---$/,/^---$/p' "$file" | grep "^title:" | sed 's/^title: *//' | tr -d '"' | tr -d "'")

            if [[ -n "$title" ]]; then
              slug=$(node -e '
                const title = (process.argv[1] ?? "").normalize("NFC").trim();
                const slug = title
                  .replace(/[/?#%]/g, "")
                  .replace(/\s+/g, "-")
                  .replace(/-+/g, "-")
                  .replace(/^-|-$/g, "");
                process.stdout.write(slug || "post");
              ' "$title")

              if [[ -e "$TMP_POSTS_DIR/${slug}.mdx" ]]; then
                suffix=$(printf "%s" "$file" | shasum -a 1 | cut -c1-8)
                slug="${slug}-${suffix}"
              fi

              cp -f "$file" "$TMP_POSTS_DIR/${slug}.mdx"
              copied_count=$((copied_count + 1))
            else
              echo "::error::No title found in frontmatter for file: $file"
              missing_title=$((missing_title + 1))
            fi
          done < <(find /tmp/obsidian/obsidian/Blog -name "*.md" -type f -print0)

          if [[ "$missing_title" -gt 0 ]]; then
            echo "Failed: $missing_title file(s) missing title frontmatter"
            exit 1
          fi

          if [[ "$copied_count" -eq 0 ]]; then
            echo "::error::No blog post copied from Obsidian source. Aborting to avoid deleting all posts."
            exit 1
          fi

          mkdir -p "$BLOG_POSTS_DIR"
          find "$BLOG_POSTS_DIR" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
          cp -f "$TMP_POSTS_DIR"/*.mdx "$BLOG_POSTS_DIR"/

      - name: Commit and push if changed
        run: |
          git status --short
          git add "$BLOG_POSTS_DIR"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --staged --quiet; then
            echo "No staged changes"
            exit 0
          fi

          git commit -m "chore(blog): sync posts from obsidian"
          GIT_SSH_COMMAND='ssh -i ~/.ssh/blog_push' git push git@github.com:Sangjun-man/blog.git HEAD:main
